apiVersion: v1
kind: Service
metadata:
  name: healthsphere-backend
spec:
  selector:
    app: healthsphere-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: healthsphere-frontend
spec:
  selector:
    app: healthsphere-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: healthsphere-redis
spec:
  selector:
    app: healthsphere-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
